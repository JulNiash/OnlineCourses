<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course list</title>
</head>
<body>

<h1>Courses List</h1>
<ul>
    {% for course in courses %}
    <li>
        {{course.title}}
        <ul>
            <a href="{% url 'course_detail' course.id %}">View</a>
            {% if user.is_authenticated %}
            <a href="{% url 'course_delete' course.id %}">Delete</a>
            <a href="{% url 'course_update' course.id %}">Update</a>
            {% endif %}
        </ul>

    </li>
    {% endfor %}
</ul>

{% if user.is_authenticated %}
<h2>Create new course</h2>
<ul>
    <a href="{% url 'course_create' %}">Create</a>
</ul>
{% endif %}


<h2>Return home</h2>
<ul>
    <a href="{% url 'home' %}">Back</a>
</ul>

</body>
</html>
